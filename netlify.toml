[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy Lambda APIs to avoid CORS issues
[[redirects]]
  from = "/api/analyze-workout"
  to = "https://viaqmsudab.execute-api.eu-north-1.amazonaws.com/analyze-workout"
  status = 200
  force = true
  [redirects.headers]
    X-Chain = ":X-Chain"
    X-Payment = ":X-Payment"

[[redirects]]
  from = "/api/agent-coach"
  to = "https://viaqmsudab.execute-api.eu-north-1.amazonaws.com/agent-coach"
  status = 200
  force = true
  [redirects.headers]
    X-Chain = ":X-Chain"
    X-Payment = ":X-Payment"
    X-Signature = ":X-Signature"

[[redirects]]
  from = "/api/agents/*"
  to = "https://r03m1wznai.execute-api.eu-north-1.amazonaws.com/prod/agents/:splat"
  status = 200
  force = true
  [redirects.headers]
    X-Chain = ":X-Chain"
    X-Payment = ":X-Payment"
    X-Signature = ":X-Signature"
    X-Agent-ID = ":X-Agent-ID"

# SPA redirect - this is crucial for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enable camera access for the app
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self), microphone=()"
    X-Content-Type-Options = "nosniff"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
